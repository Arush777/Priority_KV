name: smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Sync + CPU smoke
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --extra dev
          ./scripts/smoke_cpu.sh
