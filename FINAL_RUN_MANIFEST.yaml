# ---------------------------------------------------------------------------
# Locked claim (use this wording; do not invent a soft-INT4 quality gap)
# ---------------------------------------------------------------------------
claim: |
  Uniform KV eviction / missing-state silently corrupts tool schemas and
  instruction hierarchies in long multi-turn agent traces. Structure-aware
  retention preserves those traces at matched keep budgets.

  Soft INT4 at matched int4_frac=0.75 does NOT open a PriorityBench quality
  gap vs FullKV (falsified). The systems half of the claim is packed payload
  bytes + honest H200 latency (e2e≈FullKV, TPOT ~1.2× FI shim) with quality
  matched to FullKV on lock-240, plus measured peak/payload (cold-scratch caveat).

do_not_claim:
  - Uniform INT4 quantization alone collapses PriorityBench quality at int4_frac=0.75
  - Peak CUDA memory ≪ FullKV (FI cold scratch expands INT4→BF16 for attend)
  - Paper-grade LongBench/RULER matrices (out of middle-ground scope)

