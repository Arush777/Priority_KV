# W5 discriminator: gold state relocated to MID-context (not prefix).
# Why: plain/buried kept gold in the prefix, so FixedHot (sink+prefix+recent)
# tied P2. Moving gold to the middle should make uniform AND FixedHot miss it
# while role/risk-aware structure & structure_risk still retrieve it.
# Expect: uniform~0, fixed_hot low, structure mid, structure_risk (P2) high.
manifest_id: w5_p2_middle
rev: 1
buried_state: false
relocate_middle: true
relocate_position: 0.5
bench_manifest: data/prioritybench/manifests/w3_lock.json
selection:
  splits: [calibration, validation]
  context_lengths: [16000, 8000]
  n_tool_schema: 2
  n_instruction_supersession: 6
  n_multi_turn_state: 8
model:
  local_dirname: Qwen3-8B
  hub_id: Qwen/Qwen3-8B
  revision: b968826d9c46dd6066d109eabc6255188de91218
decode:
  max_new_tokens: 64
  temperature: 0.0
vllm:
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.65
  max_model_len: 32768
keep:
  keep_frac: 0.25
  sink_tokens: 16
  force_recent: 128
  seed: 0
  page_tokens: 16
  granularity: page
  risk_fit_path: configs/linear_risk_fit.json
  policies: [uniform, fixed_hot, structure, structure_risk, keep_all]
