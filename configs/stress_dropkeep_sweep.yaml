rev: 2
bench_manifest: data/prioritybench/manifests/w2d_pilot.json
selection:
  splits: [calibration, validation]
  context_lengths: [16000, 8000]
  n_tool_schema: 2
  n_instruction_supersession: 4
  n_multi_turn_state: 8
model:
  local_dirname: Qwen3-8B
  hub_id: Qwen/Qwen3-8B
  revision: b968826d9c46dd6066d109eabc6255188de91218
decode:
  max_new_tokens: 64
  temperature: 0.0
vllm:
  tensor_parallel_size: 1
