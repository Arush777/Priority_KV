<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="545" viewBox="0 0 1200 545" role="img" aria-labelledby="title">
<title id="title">PriorityKV policy and physical page architecture</title>
<defs>
<marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 z" fill="#20262E"/></marker>
<pattern id="evictedHatch" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#ECEFF1"/><path d="M-2,8 L8,-2 M2,10 L10,2" stroke="#AEB5BC" stroke-width="1"/></pattern>
</defs>
<rect x="0.0" y="0.0" width="1200.0" height="545.0" fill="white" stroke="white" stroke-width="1.1"/>
<text x="42.0" y="34.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="25.7" font-weight="700" fill="#20262E">Two uses of the same structural tags</text>
<text x="42.0" y="61.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="20.2" font-weight="400" fill="#5D6772">Eviction removes positions; mixed precision retains positions and changes storage.</text>
<line x1="600.0" y1="84.0" x2="600.0" y2="508.0" stroke="#D9DEE3" stroke-width="1.2"/>
<text x="42.0" y="105.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="24.3" font-weight="700" fill="#2C6DA4">(a) PriorityBench-A eviction path</text>
<rect x="42.0" y="132.0" width="526.0" height="72.0" fill="white" stroke="#2C6DA4" stroke-width="1.2"/>
<rect x="42.0" y="132.0" width="12.0" height="72.0" fill="#2C6DA4" stroke="#2C6DA4" stroke-width="1.1"/>
<text x="73.0" y="160.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="21.9" font-weight="700" fill="#20262E">1. Tag tokens</text>
<text x="73.0" y="187.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="20.0" font-weight="400" fill="#5D6772">sink · recent · system · tool · constraint · other · filler</text>
<line x1="305.0" y1="205.0" x2="305.0" y2="220.0" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="42.0" y="224.0" width="526.0" height="72.0" fill="white" stroke="#2C6DA4" stroke-width="1.2"/>
<rect x="42.0" y="224.0" width="12.0" height="72.0" fill="#2C6DA4" stroke="#2C6DA4" stroke-width="1.1"/>
<text x="73.0" y="252.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="21.9" font-weight="700" fill="#20262E">2. Set token budget</text>
<text x="73.0" y="279.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="20.0" font-weight="400" fill="#5D6772">B = max(round(kn), |M|);  M = sink + recent</text>
<line x1="305.0" y1="297.0" x2="305.0" y2="312.0" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="42.0" y="316.0" width="526.0" height="72.0" fill="white" stroke="#2C6DA4" stroke-width="1.2"/>
<rect x="42.0" y="316.0" width="12.0" height="72.0" fill="#2C6DA4" stroke="#2C6DA4" stroke-width="1.1"/>
<text x="73.0" y="344.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="21.9" font-weight="700" fill="#20262E">3. Rank and select B</text>
<text x="73.0" y="371.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="20.0" font-weight="400" fill="#5D6772">M → structural roles / other → recent-edge filler</text>
<line x1="305.0" y1="389.0" x2="305.0" y2="404.0" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="42.0" y="408.0" width="526.0" height="72.0" fill="white" stroke="#2C6DA4" stroke-width="1.2"/>
<rect x="42.0" y="408.0" width="12.0" height="72.0" fill="#2C6DA4" stroke="#2C6DA4" stroke-width="1.1"/>
<text x="73.0" y="436.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="21.9" font-weight="700" fill="#20262E">4. Gather selected positions</text>
<text x="73.0" y="463.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="20.0" font-weight="400" fill="#5D6772">Re-prefill the shortened trace; omitted KV is absent</text>
<text x="632.0" y="105.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="24.3" font-weight="700" fill="#72578D">(b) Mixed-precision page path</text>
<rect x="632.0" y="132.0" width="526.0" height="72.0" fill="white" stroke="#72578D" stroke-width="1.2"/>
<rect x="632.0" y="132.0" width="12.0" height="72.0" fill="#72578D" stroke="#72578D" stroke-width="1.1"/>
<text x="663.0" y="160.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="21.9" font-weight="700" fill="#20262E">1. Tag and group</text>
<text x="663.0" y="187.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="20.0" font-weight="400" fill="#5D6772">≤16-token pages; protected role wins ties</text>
<line x1="895.0" y1="205.0" x2="895.0" y2="220.0" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="632.0" y="224.0" width="526.0" height="72.0" fill="white" stroke="#72578D" stroke-width="1.2"/>
<rect x="632.0" y="224.0" width="12.0" height="72.0" fill="#72578D" stroke="#72578D" stroke-width="1.1"/>
<text x="663.0" y="252.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="21.9" font-weight="700" fill="#20262E">2. Assign representation</text>
<text x="663.0" y="279.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="20.0" font-weight="400" fill="#5D6772">Prefer structural roles in BF16; low-risk → codes</text>
<line x1="895.0" y1="297.0" x2="895.0" y2="312.0" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="632.0" y="316.0" width="526.0" height="72.0" fill="white" stroke="#72578D" stroke-width="1.2"/>
<rect x="632.0" y="316.0" width="12.0" height="72.0" fill="#72578D" stroke="#72578D" stroke-width="1.1"/>
<text x="663.0" y="344.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="21.9" font-weight="700" fill="#20262E">3. Enforce byte budget</text>
<text x="663.0" y="371.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="20.0" font-weight="400" fill="#5D6772">Demote by risk; sink + recent remain BF16</text>
<line x1="895.0" y1="389.0" x2="895.0" y2="404.0" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="632.0" y="408.0" width="526.0" height="72.0" fill="white" stroke="#72578D" stroke-width="1.2"/>
<rect x="632.0" y="408.0" width="12.0" height="72.0" fill="#72578D" stroke="#72578D" stroke-width="1.1"/>
<text x="663.0" y="436.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="21.9" font-weight="700" fill="#20262E">4. Decode from dtype runs</text>
<text x="663.0" y="463.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="20.0" font-weight="400" fill="#5D6772">FP32 scale / zero point; all positions remain</text>
<text x="600.0" y="530.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="20.0" font-weight="700" fill="#5D6772">evaluated independently</text>
</svg>
