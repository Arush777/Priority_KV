<text x="60.0" y="596.0" text-anchor="start" font-family="DejaVu Sans,Arial,sans-serif" font-size="14" font-weight="400" fill="#52514E">Under a matched budget the arms differ only in which pages they protect (eviction) or demote (mixed precision).</text>
