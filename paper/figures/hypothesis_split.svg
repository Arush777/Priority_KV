<text x="920.0" y="139.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="11.5" font-weight="700" fill="#20262E">108 attention · p=.125</text>
<line x1="275.0" y1="238.0" x2="307.0" y2="238.0" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="312.0" y="198.0" width="78.0" height="80.0" fill="#A44747" stroke="#A44747" stroke-width="1.1"/>
<text x="351.0" y="245.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="16.0" font-weight="700" fill="white">H2</text>
