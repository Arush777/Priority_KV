<text x="408.0" y="253.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="11.1" font-weight="400" fill="#5D6772">pack f=0.75 INT4</text>
<line x1="630.0" y1="238.0" x2="662.0" y2="238.0" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
