<text x="682.0" y="225.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="10.2" font-weight="400" fill="#5D6772">against</text>
<text x="682.0" y="252.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="12.2" font-weight="700" fill="#20262E">uniform placement</text>
