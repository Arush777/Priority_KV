<text x="408.0" y="111.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="12.2" font-weight="700" fill="#20262E">Which tokens survive?</text>
<text x="408.0" y="137.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="11.1" font-weight="400" fill="#5D6772">evict to k=0.25</text>
<line x1="630.0" y1="122.0" x2="662.0" y2="122.0" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="667.0" y="82.0" width="196.0" height="80.0" fill="white" stroke="#D9DEE3" stroke-width="1.0"/>
<text x="682.0" y="109.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="10.2" font-weight="400" fill="#5D6772">against</text>
<text x="682.0" y="136.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="12.2" font-weight="700" fill="#20262E">blind + attention</text>
<line x1="863.0" y1="122.0" x2="895.0" y2="122.0" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
