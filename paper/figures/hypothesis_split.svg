<rect x="900.0" y="198.0" width="258.0" height="80.0" fill="white" stroke="#A44747" stroke-width="1.3"/>
<text x="920.0" y="227.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="13.0" font-weight="700" fill="#A44747">0.8833 vs 0.8792</text>
<text x="920.0" y="255.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="11.5" font-weight="700" fill="#20262E">no quality gain</text>
<line x1="275.0" y1="354.0" x2="307.0" y2="354.0" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="312.0" y="314.0" width="78.0" height="80.0" fill="#72578D" stroke="#72578D" stroke-width="1.1"/>
<text x="351.0" y="361.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="16.0" font-weight="700" fill="white">H3</text>
<rect x="390.0" y="314.0" width="240.0" height="80.0" fill="white" stroke="#D9DEE3" stroke-width="1.0"/>
<text x="408.0" y="343.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="12.2" font-weight="700" fill="#20262E">What does it cost?</text>
<text x="408.0" y="369.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="11.1" font-weight="400" fill="#5D6772">packed H200 path</text>
<line x1="630.0" y1="354.0" x2="662.0" y2="354.0" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="667.0" y="314.0" width="196.0" height="80.0" fill="white" stroke="#D9DEE3" stroke-width="1.0"/>
<text x="682.0" y="341.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="10.2" font-weight="400" fill="#5D6772">against</text>
<text x="682.0" y="368.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="12.2" font-weight="700" fill="#20262E">FullKV</text>
<line x1="863.0" y1="354.0" x2="895.0" y2="354.0" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="900.0" y="314.0" width="258.0" height="80.0" fill="white" stroke="#72578D" stroke-width="1.3"/>
<text x="920.0" y="343.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="13.0" font-weight="700" fill="#72578D">0.719× bytes</text>
<text x="920.0" y="371.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="11.5" font-weight="700" fill="#20262E">1.20× TPOT</text>
<text x="42.0" y="423.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#5D6772">The eviction verdict does not imply an INT4-quality or latency verdict.</text>
<text x="1158.0" y="423.0" text-anchor="end" font-family="Liberation Sans,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#5D6772">Hybrid = SnapKV at k=0.25</text>
</svg>
