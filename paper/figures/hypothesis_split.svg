</defs>
<rect x="0.0" y="0.0" width="1200.0" height="445.0" fill="white" stroke="white" stroke-width="1.1"/>
<text x="42.0" y="35.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="17.0" font-weight="700" fill="#20262E">One frozen benchmark, three independent questions</text>
<rect x="42.0" y="75.0" width="190.0" height="80.0" fill="white" stroke="#20262E" stroke-width="1.2"/>
<text x="137.0" y="103.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="11.2" font-weight="700" fill="#5D6772">COMMON INPUT</text>
<text x="137.0" y="127.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="13.2" font-weight="700" fill="#20262E">PriorityBench-A</text>
<text x="137.0" y="146.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="10.8" font-weight="400" fill="#20262E">frozen model + seeds</text>
<line x1="232.0" y1="115.0" x2="275.0" y2="115.0" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="275.0" y1="115.0" x2="275.0" y2="345.0" stroke="#20262E" stroke-width="1.0"/>
<line x1="275.0" y1="122.0" x2="307.0" y2="122.0" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
