<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="625" viewBox="0 0 1200 625" role="img" aria-labelledby="title">
<title id="title">PriorityKV mixed decode and memory lifetime</title>
<defs>
<marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 z" fill="#20262E"/></marker>
<pattern id="evictedHatch" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#ECEFF1"/><path d="M-2,8 L8,-2 M2,10 L10,2" stroke="#AEB5BC" stroke-width="1"/></pattern>
</defs>
<rect x="0.0" y="0.0" width="1200.0" height="625.0" fill="white" stroke="white" stroke-width="1.1"/>
<text x="42.0" y="34.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="15.0" font-weight="700" fill="#20262E">Per-layer mixed decode</text>
<text x="42.0" y="55.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="12.0" font-weight="400" fill="#5D6772">The packed payload persists; eager BF16 cold scratch is transient implementation overhead.</text>
<text x="42.0" y="91.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="10.8" font-weight="700" fill="#5D6772">PERSISTENT CACHE</text>
<rect x="42.0" y="106.0" width="215.0" height="62.0" fill="white" stroke="#315A48" stroke-width="1.3"/>
<text x="58.0" y="131.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="12.2" font-weight="700" fill="#315A48">hot pages + decode tail</text>
<text x="58.0" y="153.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="11.2" font-weight="400" fill="#20262E">BF16 · GPU resident</text>
<rect x="42.0" y="190.0" width="215.0" height="62.0" fill="white" stroke="#82AFC8" stroke-width="1.3"/>
<text x="58.0" y="215.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="12.2" font-weight="700" fill="#2C6DA4">cold pages</text>
<text x="58.0" y="237.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="11.2" font-weight="400" fill="#20262E">packed INT4 + scales</text>
<text x="322.0" y="91.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="10.8" font-weight="700" fill="#5D6772">MATERIALIZE</text>
<rect x="322.0" y="190.0" width="180.0" height="62.0" fill="#F6F7F8" stroke="#82AFC8" stroke-width="1.3"/>
<text x="412.0" y="215.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="12.2" font-weight="700" fill="#2C6DA4">cold scratch</text>
<text x="412.0" y="237.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="11.2" font-weight="400" fill="#20262E">INT4 → BF16</text>
<line x1="257.0" y1="221.0" x2="316.0" y2="221.0" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="566.0" y="91.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="10.8" font-weight="700" fill="#5D6772">≤ 2 HOMOGENEOUS CALLS</text>
<rect x="566.0" y="106.0" width="188.0" height="62.0" fill="white" stroke="#315A48" stroke-width="1.3"/>
<text x="660.0" y="131.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="12.2" font-weight="700" fill="#315A48">FlashInfer A</text>
<text x="660.0" y="153.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="11.2" font-weight="400" fill="#20262E">q × hot + tail</text>
<rect x="566.0" y="190.0" width="188.0" height="62.0" fill="white" stroke="#82AFC8" stroke-width="1.3"/>
<text x="660.0" y="215.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="12.2" font-weight="700" fill="#2C6DA4">FlashInfer B</text>
<text x="660.0" y="237.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="11.2" font-weight="400" fill="#20262E">q × cold scratch</text>
<line x1="257.0" y1="137.0" x2="560.0" y2="137.0" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="502.0" y1="221.0" x2="560.0" y2="221.0" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="534.0" y="171.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="12.0" font-weight="700" fill="#20262E">q</text>
<polyline points="534.0,176.0 534.0,221.0 560.0,221.0" fill="none" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="824.0" y="148.0" width="154.0" height="70.0" fill="white" stroke="#72578D" stroke-width="1.4"/>
<text x="901.0" y="176.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="12.8" font-weight="700" fill="#72578D">LSE merge</text>
<text x="901.0" y="199.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="11.2" font-weight="400" fill="#20262E">two partial states</text>
<polyline points="754.0,137.0 790.0,137.0 790.0,174.0 818.0,174.0" fill="none" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<polyline points="754.0,221.0 790.0,221.0 790.0,192.0 818.0,192.0" fill="none" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="1042.0" y="148.0" width="116.0" height="70.0" fill="white" stroke="#20262E" stroke-width="1.3"/>
<text x="1100.0" y="176.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="12.2" font-weight="700" fill="#20262E">append K/V</text>
<text x="1100.0" y="199.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="11.2" font-weight="400" fill="#20262E">next token</text>
<line x1="978.0" y1="183.0" x2="1036.0" y2="183.0" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<polyline points="1100.0,218.0 1100.0,275.0 150.0,275.0 150.0,174.0" fill="none" stroke="#20262E" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
<text x="621.0" y="292.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="11.2" font-weight="400" fill="#5D6772">decode loop: tail grows by one token</text>
<line x1="38.0" y1="314.0" x2="1162.0" y2="314.0" stroke="#D9DEE3" stroke-width="1.2"/>
<text x="42.0" y="340.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="15.0" font-weight="700" fill="#20262E">Request lifetime</text>
<line x1="205.0" y1="371.0" x2="1142.0" y2="371.0" stroke="#20262E" stroke-width="0.9" marker-end="url(#arrow)"/>
<line x1="205.0" y1="365.0" x2="205.0" y2="378.0" stroke="#20262E" stroke-width="0.8"/>
<text x="205.0" y="394.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="10.8" font-weight="400" fill="#5D6772">prefill</text>
<line x1="390.0" y1="365.0" x2="390.0" y2="378.0" stroke="#20262E" stroke-width="0.8"/>
<text x="390.0" y="394.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="10.8" font-weight="400" fill="#5D6772">pack</text>
<line x1="565.0" y1="365.0" x2="565.0" y2="378.0" stroke="#20262E" stroke-width="0.8"/>
<text x="565.0" y="394.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="10.8" font-weight="400" fill="#5D6772">prepare</text>
<line x1="750.0" y1="365.0" x2="750.0" y2="378.0" stroke="#20262E" stroke-width="0.8"/>
<text x="750.0" y="394.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="10.8" font-weight="400" fill="#5D6772">decode 1</text>
<line x1="960.0" y1="365.0" x2="960.0" y2="378.0" stroke="#20262E" stroke-width="0.8"/>
<text x="960.0" y="394.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="10.8" font-weight="400" fill="#5D6772">decode 2…T</text>
<line x1="1142.0" y1="365.0" x2="1142.0" y2="378.0" stroke="#20262E" stroke-width="0.8"/>
<text x="1142.0" y="394.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="10.8" font-weight="400" fill="#5D6772">free</text>
<text x="42.0" y="429.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="11.5" font-weight="700" fill="#20262E">packed payload</text>
<rect x="390.0" y="412.0" width="752.0" height="22.0" fill="#2C6DA4" stroke="#2C6DA4" stroke-width="1.1"/>
<text x="766.0" y="429.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="11.0" font-weight="700" fill="white">persistent · 0.719× payload</text>
<text x="42.0" y="475.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="11.5" font-weight="700" fill="#20262E">BF16 cold scratch</text>
<rect x="565.0" y="458.0" width="577.0" height="22.0" fill="#82AFC8" stroke="#82AFC8" stroke-width="1.1"/>
<text x="853.5" y="475.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="11.0" font-weight="700" fill="#20262E">transient · drives 0.868× peak</text>
<text x="42.0" y="521.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="11.5" font-weight="700" fill="#20262E">decode tail</text>
<rect x="750.0" y="504.0" width="392.0" height="22.0" fill="#B57A28" stroke="#B57A28" stroke-width="1.1"/>
<text x="946.0" y="521.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="11.0" font-weight="700" fill="white">grows each step</text>
<line x1="1142.0" y1="406.0" x2="1142.0" y2="532.0" stroke="#A44747" stroke-width="1.2"/>
<text x="1142.0" y="552.0" text-anchor="end" font-family="Liberation Sans,Arial,sans-serif" font-size="10.8" font-weight="400" fill="#A44747">request state released</text>
<text x="42.0" y="596.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="11.8" font-weight="700" fill="#A44747">Measured per-token latency: 1.200–1.215× FullKV</text>
