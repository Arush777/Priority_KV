<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="590" viewBox="0 0 1200 590" role="img" aria-labelledby="title">
<title id="title">PriorityKV mixed decode and memory lifetime</title>
<defs>
<marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 z" fill="#20262E"/></marker>
<pattern id="evictedHatch" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#ECEFF1"/><path d="M-2,8 L8,-2 M2,10 L10,2" stroke="#AEB5BC" stroke-width="1"/></pattern>
</defs>
<rect x="0.0" y="0.0" width="1200.0" height="590.0" fill="white" stroke="white" stroke-width="1.1"/>
<text x="42.0" y="35.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="25.7" font-weight="700" fill="#20262E">Mixed decode: append, attend twice, then merge</text>
<text x="42.0" y="63.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="20.2" font-weight="400" fill="#5D6772">The new token joins the BF16 tail before either attention call.</text>
<rect x="42.0" y="94.0" width="190.0" height="76.0" fill="white" stroke="#20262E" stroke-width="1.4"/>
<text x="137.0" y="125.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="21.9" font-weight="700" fill="#20262E">1  project q, k, v</text>
<text x="137.0" y="152.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="20.0" font-weight="400" fill="#5D6772">Qwen3 norms + RoPE</text>
<rect x="270.0" y="94.0" width="210.0" height="76.0" fill="white" stroke="#B57A28" stroke-width="1.4"/>
<text x="375.0" y="125.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="21.9" font-weight="700" fill="#B57A28">2  append k / v</text>
<text x="375.0" y="152.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="20.0" font-weight="400" fill="#5D6772">BF16 decode tail</text>
<rect x="836.0" y="133.0" width="172.0" height="76.0" fill="white" stroke="#72578D" stroke-width="1.4"/>
<text x="922.0" y="164.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="21.9" font-weight="700" fill="#72578D">4  LSE merge</text>
<text x="922.0" y="191.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="20.0" font-weight="400" fill="#5D6772">partial states</text>
<rect x="1046.0" y="133.0" width="112.0" height="76.0" fill="white" stroke="#20262E" stroke-width="1.4"/>
<text x="1102.0" y="164.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="21.9" font-weight="700" fill="#20262E">5  output</text>
<text x="1102.0" y="191.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="20.0" font-weight="400" fill="#5D6772">next layer</text>
<line x1="232.0" y1="132.0" x2="264.0" y2="132.0" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="524.0" y="84.0" width="250.0" height="76.0" fill="white" stroke="#315A48" stroke-width="1.4"/>
<text x="649.0" y="115.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="21.9" font-weight="700" fill="#315A48">3a  FlashInfer hot</text>
<text x="649.0" y="142.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="20.0" font-weight="400" fill="#5D6772">q × (hot pages + tail)</text>
<rect x="524.0" y="190.0" width="250.0" height="76.0" fill="white" stroke="#2C6DA4" stroke-width="1.4"/>
<text x="649.0" y="221.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="21.9" font-weight="700" fill="#2C6DA4">3b  FlashInfer cold</text>
<text x="649.0" y="248.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="20.0" font-weight="400" fill="#5D6772">q × BF16 cold scratch</text>
<polyline points="480.0,132.0 501.0,132.0 501.0,122.0 518.0,122.0" fill="none" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<polyline points="480.0,132.0 501.0,132.0 501.0,228.0 518.0,228.0" fill="none" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<polyline points="774.0,122.0 804.0,122.0 804.0,157.0 830.0,157.0" fill="none" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<polyline points="774.0,228.0 804.0,228.0 804.0,185.0 830.0,185.0" fill="none" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="1008.0" y1="171.0" x2="1040.0" y2="171.0" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="42.0" y="226.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="20.9" font-weight="700" fill="#2C6DA4">Cold cache</text>
<text x="42.0" y="251.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="20.0" font-weight="400" fill="#5D6772">uint8 codes + FP32 scale / zero point</text>
<line x1="332.0" y1="238.0" x2="518.0" y2="238.0" stroke="#20262E" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="42.0" y="286.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="20.0" font-weight="400" fill="#5D6772">The sequence length is committed after all layers; the loop then advances one token.</text>
<line x1="38.0" y1="315.0" x2="1162.0" y2="315.0" stroke="#D9DEE3" stroke-width="1.2"/>
<text x="42.0" y="345.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="24.3" font-weight="700" fill="#20262E">Request-lifetime allocations</text>
<line x1="270.0" y1="376.0" x2="1140.0" y2="376.0" stroke="#20262E" stroke-width="1.0" marker-end="url(#arrow)"/>
<line x1="270.0" y1="369.0" x2="270.0" y2="384.0" stroke="#20262E" stroke-width="0.9"/>
<text x="270.0" y="403.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="20.0" font-weight="400" fill="#5D6772">prefill</text>
<line x1="450.0" y1="369.0" x2="450.0" y2="384.0" stroke="#20262E" stroke-width="0.9"/>
<text x="450.0" y="403.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="20.0" font-weight="400" fill="#5D6772">pack</text>
<line x1="630.0" y1="369.0" x2="630.0" y2="384.0" stroke="#20262E" stroke-width="0.9"/>
<text x="630.0" y="403.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="20.0" font-weight="400" fill="#5D6772">prepare</text>
<line x1="810.0" y1="369.0" x2="810.0" y2="384.0" stroke="#20262E" stroke-width="0.9"/>
<text x="810.0" y="403.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="20.0" font-weight="400" fill="#5D6772">decode</text>
<line x1="1140.0" y1="369.0" x2="1140.0" y2="384.0" stroke="#20262E" stroke-width="0.9"/>
<text x="1140.0" y="403.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="20.0" font-weight="400" fill="#5D6772">free</text>
<text x="42.0" y="444.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="20.2" font-weight="700" fill="#20262E">implemented code + metadata</text>
<rect x="450.0" y="424.0" width="690.0" height="27.0" fill="#2C6DA4" stroke="#2C6DA4" stroke-width="1.1"/>
<text x="795.0" y="444.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="19.6" font-weight="700" fill="white">persistent · payload ratio 0.719×</text>
<text x="42.0" y="496.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="20.2" font-weight="700" fill="#20262E">BF16 cold scratch</text>
<rect x="630.0" y="476.0" width="510.0" height="27.0" fill="#82AFC8" stroke="#82AFC8" stroke-width="1.1"/>
<text x="885.0" y="496.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="19.6" font-weight="700" fill="#20262E">transient · allocated peak ratio 0.868×</text>
<text x="42.0" y="548.0" text-anchor="start" font-family="Liberation Sans,Arial,sans-serif" font-size="20.2" font-weight="700" fill="#20262E">BF16 decode tail</text>
<rect x="810.0" y="528.0" width="330.0" height="27.0" fill="#B57A28" stroke="#B57A28" stroke-width="1.1"/>
<text x="975.0" y="548.0" text-anchor="middle" font-family="Liberation Sans,Arial,sans-serif" font-size="19.6" font-weight="700" fill="white">grows one token per step</text>
</svg>
